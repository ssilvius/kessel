name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: kessel-linux-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: kessel-windows-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: kessel-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install g++ (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y g++

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release (Linux)
        if: runner.os == 'Linux'
        env:
          RUSTFLAGS: "-C link-arg=-lstdc++"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release (non-Linux)
        if: runner.os != 'Linux'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/kessel

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/kessel.exe

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Package binaries
        run: |
          cd artifacts
          tar czf kessel-linux-x86_64.tar.gz -C kessel-linux-x86_64 kessel
          zip kessel-windows-x86_64.zip -j kessel-windows-x86_64/kessel.exe
          tar czf kessel-macos-aarch64.tar.gz -C kessel-macos-aarch64 kessel

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            artifacts/kessel-linux-x86_64.tar.gz
            artifacts/kessel-windows-x86_64.zip
            artifacts/kessel-macos-aarch64.tar.gz
